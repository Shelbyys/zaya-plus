<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp — ZAYA PLUS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a25;
--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
--text:#eee;--text2:#999;--text3:#666;
--accent:#25d366;--accent2:#128c7e;
--purple:#6c5ce7;--purple2:#a29bfe;
--red:#ff5252;--yellow:#ffd740;
--radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:12px}
.header-title{font-size:1.1rem;font-weight:700}
.header-sub{font-size:0.75rem;color:var(--text2)}
.back-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border2);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.8rem;font-family:'Inter',sans-serif;transition:all 0.2s}
.back-btn:hover{background:rgba(255,255,255,0.1)}
.container{max-width:900px;margin:0 auto;padding:24px 24px 60px}
.section-title{font-size:0.65rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin:28px 0 12px;padding-left:4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.card-title{font-size:0.9rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.instance{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:16px;transition:border-color 0.3s}
.instance:hover{border-color:var(--border2)}
.instance-icon{width:42px;height:42px;border-radius:50%;background:rgba(37,211,102,0.1);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.instance-info{flex:1}
.instance-name{font-size:0.9rem;font-weight:600}
.instance-phone{font-size:0.75rem;color:var(--text2);margin-top:2px}
.instance-badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.badge{font-size:0.55rem;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:0.5px}
.badge-green{background:rgba(37,211,102,0.15);color:var(--accent)}
.badge-yellow{background:rgba(255,215,64,0.15);color:var(--yellow)}
.badge-red{background:rgba(255,82,82,0.15);color:var(--red)}
.badge-purple{background:rgba(108,92,231,0.15);color:var(--purple2)}
.instance-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:7px 16px;border:none;border-radius:8px;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s}
.btn:hover{opacity:0.9;transform:translateY(-1px)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff}
.btn-secondary{background:rgba(255,255,255,0.06);color:var(--text2);border:1px solid var(--border2)}
.btn-danger{background:rgba(255,82,82,0.12);color:var(--red);border:1px solid rgba(255,82,82,0.2)}
.btn-sm{padding:5px 12px;font-size:0.7rem}
.form-row{display:flex;gap:10px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:4px;flex:1}
.field-label{font-size:0.7rem;color:var(--text2);font-weight:500}
.field-input,.field-select,.field-textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:8px;font-size:0.85rem;font-family:'Inter',sans-serif;transition:border-color 0.2s;width:100%}
.field-input:focus,.field-select:focus,.field-textarea:focus{outline:none;border-color:var(--accent)}
.field-textarea{resize:vertical;min-height:60px}
.qr-area{text-align:center;padding:24px;border:2px dashed var(--border2);border-radius:var(--radius);margin:16px 0;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.qr-area img{max-width:250px;border-radius:8px}
.qr-timer{width:100%;max-width:250px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.qr-timer-bar{height:100%;background:var(--accent);transition:width 0.3s}
.qr-status{font-size:0.8rem;color:var(--text2)}
.qr-code-display{font-size:2rem;font-weight:700;letter-spacing:6px;color:var(--accent);font-family:monospace}
.config-group{font-size:0.6rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.config-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.config-row:last-child{border-bottom:none}
.config-left{flex:1}
.config-label{font-size:0.8rem;font-weight:500}
.config-desc{font-size:0.7rem;color:var(--text3);margin-top:2px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bg3);border-radius:22px;cursor:pointer;transition:0.3s;border:1px solid var(--border2)}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:var(--text3);border-radius:50%;transition:0.3s}
.toggle input:checked+.toggle-slider{background:var(--accent);border-color:var(--accent)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:#fff}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{font-size:0.7rem;padding:4px 10px;background:rgba(255,255,255,0.06);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;gap:6px}
.tag-remove{cursor:pointer;color:var(--red);font-weight:700;font-size:0.8rem}
.tag-add{display:flex;gap:6px;margin-top:6px}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;font-size:0.8rem;font-weight:500;animation:slideIn 0.3s;backdrop-filter:blur(8px)}
.toast.success{background:rgba(37,211,102,0.15);color:var(--accent);border:1px solid rgba(37,211,102,0.2)}
.toast.error{background:rgba(255,82,82,0.15);color:var(--red);border:1px solid rgba(255,82,82,0.2)}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:0.85rem}
@media(max-width:600px){.instance{flex-direction:column;align-items:flex-start}.instance-actions{width:100%}.form-row{flex-direction:column}}
</style>
</head>
<body>
<div class="header">
<div class="header-left">
<span style="font-size:1.4rem">&#128172;</span>
<div><div class="header-title">WhatsApp</div><div class="header-sub">Conexoes e configuracoes do bot</div></div>
</div>
<button class="back-btn" onclick="location.href='/'">&#8592; Voltar</button>
</div>
<div class="container">
<div class="section-title">Instancias Conectadas</div>
<div id="instanceList"><div class="empty"><div class="spinner"></div><br>Carregando...</div></div>
<div class="section-title">Nova Conexao</div>
<div class="card">
<div class="card-title">&#128279; Conectar WhatsApp</div>
<div class="form-row">
<div class="field"><label class="field-label">Nome da instancia</label><input class="field-input" id="pairName" placeholder="Ex: principal"></div>
<div class="field"><label class="field-label">Telefone com DDD</label><input class="field-input" id="pairPhone" placeholder="5511999999999"></div>
</div>
<div class="form-row">
<div class="field"><label class="field-label">Label (opcional)</label><input class="field-input" id="pairLabel" placeholder="Ex: Comercial, Pessoal..."></div>
</div>
<div style="display:flex;gap:8px;margin-top:12px">
<button class="btn btn-primary" onclick="connectQR()">&#9641; QR Code</button>
<button class="btn btn-secondary" onclick="connectCode()">&#128290; Codigo Numerico</button>
</div>
<div id="pairResult" style="margin-top:16px"></div>
</div>
<div class="section-title">Configuracoes do Bot</div>
<div class="card" id="botConfigCard"><div class="empty"><div class="spinner"></div><br>Carregando...</div></div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
let _cfg={},_instances=[],_default='',_qrSource=null;
async function init(){await Promise.all([loadInstances(),loadConfig()])}
async function loadInstances(){
try{
const r=await fetch('/api/whatsapp/instances');const d=await r.json();
_instances=d.instances||[];_default=d.defaultInstance||'';renderInstances();
}catch(e){document.getElementById('instanceList').innerHTML='<div class="empty">Erro ao carregar</div>';}
}
function renderInstances(){
const el=document.getElementById('instanceList');
if(!_instances.length){el.innerHTML='<div class="empty">Nenhuma instancia conectada. Use o formulario abaixo.</div>';return;}
el.innerHTML=_instances.map(i=>{
const isDef=i.name===_default;
const sMap={connected:'Conectado',connecting:'Conectando...',reconnecting:'Reconectando...'};
const sLabel=sMap[i.status]||'Desconectado';
const sCls=i.status==='connected'?'badge-green':i.status==='connecting'||i.status==='reconnecting'?'badge-yellow':'badge-red';
return `<div class="instance">
<div class="instance-icon">&#128241;</div>
<div class="instance-info">
<div class="instance-name">${i.name}${i.label?' — '+i.label:''}</div>
<div class="instance-phone">${i.phone||'Sem numero'}</div>
<div class="instance-badges">
<span class="badge ${sCls}">${sLabel}</span>
${isDef?'<span class="badge badge-purple">PADRAO</span>':''}
${i.active!==false?'<span class="badge badge-green">BOT IA</span>':''}
</div>
</div>
<div class="instance-actions">
${!isDef?`<button class="btn btn-sm btn-secondary" onclick="setDefault('${i.name}')">Definir Padrao</button>`:''}
<button class="btn btn-sm btn-secondary" onclick="reconnect('${i.name}')">Reconectar</button>
<button class="btn btn-sm btn-danger" onclick="remove('${i.name}')">Remover</button>
</div>
</div>`;
}).join('');
}
async function setDefault(n){await fetch(`/api/whatsapp/default/${n}`,{method:'POST'});showToast('Padrao atualizado','success');loadInstances();}
async function reconnect(n){showToast('Reconectando...','success');await fetch(`/api/whatsapp/reconnect/${n}`,{method:'POST'});setTimeout(loadInstances,2000);}
async function remove(n){if(!confirm(`Remover "${n}"?`))return;await fetch(`/api/whatsapp/instances/${n}`,{method:'DELETE'});showToast('Removida','success');loadInstances();}
function connectQR(){
const name=document.getElementById('pairName').value.trim()||'principal';
const phone=document.getElementById('pairPhone').value.trim();
const label=document.getElementById('pairLabel').value.trim();
if(!phone){showToast('Informe o telefone','error');return;}
const result=document.getElementById('pairResult');
result.innerHTML=`<div class="qr-area"><div class="spinner"></div><div class="qr-status">Gerando QR Code...</div></div>`;
if(_qrSource)_qrSource.close();
_qrSource=new EventSource(`/api/whatsapp/pair-qr?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&label=${encodeURIComponent(label)}`);
let qc=0;
_qrSource.addEventListener('qr',(e)=>{qc++;document.getElementById('pairResult').querySelector('.qr-area').innerHTML=`
<img src="${e.data}"><div class="qr-status">Escaneie com o WhatsApp (${qc}/8)</div>
<div class="qr-timer"><div class="qr-timer-bar" style="width:100%;animation:shrink 20s linear forwards"></div></div>
<style>@keyframes shrink{to{width:0}}</style>`;});
_qrSource.addEventListener('connected',()=>{_qrSource.close();result.innerHTML=`<div class="qr-area" style="border-color:var(--accent)"><div style="font-size:2rem">&#10003;</div><div style="font-size:1rem;font-weight:600;color:var(--accent)">Conectado!</div></div>`;showToast('WhatsApp conectado!','success');loadInstances();});
_qrSource.addEventListener('timeout',()=>{_qrSource.close();result.innerHTML=`<div class="qr-area" style="border-color:var(--red)"><div style="color:var(--red)">Tempo esgotado.</div><button class="btn btn-primary" onclick="connectQR()">Tentar Novamente</button></div>`;});
_qrSource.addEventListener('error',()=>{_qrSource.close();result.innerHTML=`<div class="qr-area" style="border-color:var(--red)"><div style="color:var(--red)">Erro na conexao.</div><button class="btn btn-primary" onclick="connectQR()">Tentar Novamente</button></div>`;});
}
async function connectCode(){
const name=document.getElementById('pairName').value.trim()||'principal';
const phone=document.getElementById('pairPhone').value.trim();
const label=document.getElementById('pairLabel').value.trim();
if(!phone){showToast('Informe o telefone','error');return;}
const result=document.getElementById('pairResult');
result.innerHTML=`<div class="qr-area"><div class="spinner"></div><div class="qr-status">Gerando codigo...</div></div>`;
try{
const r=await fetch('/api/whatsapp/pair',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,phone,label})});
const d=await r.json();if(!d.code)throw new Error(d.error||'Erro');
result.innerHTML=`<div class="qr-area"><div class="qr-code-display">${d.code}</div><div class="qr-status">WhatsApp > Aparelhos conectados > Conectar > Inserir codigo</div><div class="qr-timer"><div class="qr-timer-bar" style="width:100%;animation:shrink 60s linear forwards"></div></div><style>@keyframes shrink{to{width:0}}</style></div>`;
let att=0;const poll=setInterval(async()=>{att++;try{const cr=await fetch('/api/whatsapp/instances');const cd=await cr.json();if((cd.instances||[]).find(i=>i.name===name&&i.status==='connected')){clearInterval(poll);result.innerHTML=`<div class="qr-area" style="border-color:var(--accent)"><div style="font-size:2rem">&#10003;</div><div style="font-size:1rem;font-weight:600;color:var(--accent)">Conectado!</div></div>`;showToast('WhatsApp conectado!','success');loadInstances();}}catch{}if(att>30)clearInterval(poll);},2000);
}catch(e){result.innerHTML=`<div class="qr-area" style="border-color:var(--red)"><div style="color:var(--red)">${e.message}</div></div>`;}
}
async function loadConfig(){
try{const r=await fetch('/api/bot/config');_cfg=await r.json();renderConfig();}
catch(e){document.getElementById('botConfigCard').innerHTML='<div class="empty">Erro ao carregar</div>';}
}
function renderConfig(){
const c=_cfg;
document.getElementById('botConfigCard').innerHTML=`
<div class="card-title">&#9881; Configuracoes do Bot IA</div>
<div class="config-group">Identidade</div>
<div class="form-row">
<div class="field"><label class="field-label">Nome do Bot</label><input class="field-input" value="${c.botName||'ZAYA'}" onchange="cfgSet('botName',this.value)"></div>
<div class="field"><label class="field-label">Como chamar o usuario</label><input class="field-input" value="${c.callName||''}" placeholder="Deixe vazio = nome do admin" onchange="cfgSet('callName',this.value)"></div>
</div>
<div class="field" style="margin-top:8px"><label class="field-label">Mensagem de boas-vindas</label><textarea class="field-textarea" placeholder="Enviada quando novo contato escreve" onchange="cfgSet('welcomeMessage',this.value)">${c.welcomeMessage||''}</textarea></div>
<div class="config-group">Controle</div>
${tgl('botActive','Bot Ativo','Responde mensagens automaticamente',c.botActive)}
${tgl('readReceipts','Marcar como Lido','Envia ticks azuis',c.readReceipts)}
${tgl('replyGroups','Responder em Grupos','Bot responde em grupos',c.replyGroups)}
${tgl('autoLoginAdmin','Auto-login Admin','Pula login para acesso local',c.autoLoginAdmin)}
<div class="config-group">Funcionalidades</div>
${tgl('transcribeAudio','Transcrever Audios','Converte audios em texto com Whisper',c.transcribeAudio)}
${tgl('analyzeImages','Analisar Imagens','Analisa fotos com GPT-4 Vision',c.analyzeImages)}
${tgl('editVideos','Editar Videos','Edita videos com instrucoes por texto',c.editVideos)}
<div class="config-group">Modelo IA</div>
<div class="form-row">
<div class="field"><label class="field-label">Modelo</label>
<select class="field-select" onchange="cfgSet('aiModel',this.value)">
${['gpt-4o-mini','gpt-4o','gpt-4.1-mini','gpt-4.1','claude-sonnet-4-20250514','claude-haiku-4-5-20251001','llama-3.3-70b-versatile','llama-3.1-8b-instant','gemini-2.0-flash'].map(m=>`<option value="${m}"${c.aiModel===m?' selected':''}>${m}</option>`).join('')}
</select></div>
<div class="field"><label class="field-label">Max Tokens: <strong id="tv">${c.maxTokens||1024}</strong></label>
<input type="range" min="128" max="4096" step="128" value="${c.maxTokens||1024}" oninput="document.getElementById('tv').textContent=this.value" onchange="cfgSet('maxTokens',parseInt(this.value))" style="accent-color:var(--accent)"></div>
</div>
<div class="config-group">Permissoes</div>
<div class="form-row">
<div class="field"><label class="field-label">Quem pode usar</label>
<select class="field-select" onchange="cfgSet('replyMode',this.value);renderConfig()">
<option value="admin_only"${c.replyMode==='admin_only'?' selected':''}>Somente Admin</option>
<option value="whitelist"${c.replyMode==='whitelist'?' selected':''}>Lista de autorizados</option>
<option value="everyone"${c.replyMode==='everyone'?' selected':''}>Todos</option>
</select></div>
</div>
<div class="field" style="margin-top:8px"><label class="field-label">Numeros Admin</label>
<div class="tag-list">${(c.adminNumbers||[]).map(n=>`<span class="tag">${n}<span class="tag-remove" onclick="cfgRemove('adminNumbers','${n}')">x</span></span>`).join('')}</div>
<div class="tag-add"><input class="field-input" id="addAdmin" placeholder="5511999999999" style="flex:1"><button class="btn btn-sm btn-secondary" onclick="cfgAdd('adminNumbers','addAdmin')">+</button></div>
</div>
${c.replyMode==='whitelist'?`<div class="field" style="margin-top:12px"><label class="field-label">Contatos Autorizados</label>
<div class="tag-list">${(c.whitelist||[]).map(n=>`<span class="tag">${n}<span class="tag-remove" onclick="cfgRemove('whitelist','${n}')">x</span></span>`).join('')}</div>
<div class="tag-add"><input class="field-input" id="addWl" placeholder="5511999999999" style="flex:1"><button class="btn btn-sm btn-secondary" onclick="cfgAdd('whitelist','addWl')">+</button></div>
</div>`:''}
<div class="field" style="margin-top:12px"><label class="field-label">Resposta para nao autorizados</label>
<textarea class="field-textarea" placeholder="Vazio = ignora silenciosamente" onchange="cfgSet('unauthorizedReply',this.value)">${c.unauthorizedReply||''}</textarea></div>
<div class="config-group">Monitoramento</div>
<div class="field"><label class="field-label">Numeros Monitorados</label>
<div class="tag-list">${(c.watchNumbers||[]).map(w=>`<span class="tag">${w.nome||w.numero} (${w.numero})<span class="tag-remove" onclick="cfgRemoveW('${w.numero}')">x</span></span>`).join('')}</div>
<div class="tag-add"><input class="field-input" id="wPhone" placeholder="Numero" style="flex:1"><input class="field-input" id="wName" placeholder="Nome" style="flex:1"><button class="btn btn-sm btn-secondary" onclick="cfgAddW()">+</button></div>
</div>
<div class="form-row" style="margin-top:8px"><div class="field"><label class="field-label">Como notificar</label>
<select class="field-select" onchange="cfgSet('watchNotifyMode',this.value)">
<option value="both"${c.watchNotifyMode==='both'?' selected':''}>Voz + WhatsApp</option>
<option value="whatsapp"${c.watchNotifyMode==='whatsapp'?' selected':''}>Somente WhatsApp</option>
<option value="voice"${c.watchNotifyMode==='voice'?' selected':''}>Somente Voz</option>
</select></div></div>`;
}
function tgl(k,l,d,v){return `<div class="config-row"><div class="config-left"><div class="config-label">${l}</div><div class="config-desc">${d}</div></div><label class="toggle"><input type="checkbox" ${v!==false?'checked':''} onchange="cfgSet('${k}',this.checked)"><span class="toggle-slider"></span></label></div>`;}
async function cfgSet(k,v){_cfg[k]=v;try{await fetch('/api/bot/config',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({[k]:v})});showToast('Salvo!','success');}catch{showToast('Erro','error');}}
async function cfgAdd(k,id){const i=document.getElementById(id);const v=i.value.trim();if(!v)return;const a=_cfg[k]||[];if(a.includes(v))return;a.push(v);await cfgSet(k,a);i.value='';renderConfig();}
async function cfgRemove(k,v){_cfg[k]=(_cfg[k]||[]).filter(x=>x!==v);await cfgSet(k,_cfg[k]);renderConfig();}
async function cfgAddW(){const p=document.getElementById('wPhone').value.trim();const n=document.getElementById('wName').value.trim();if(!p)return;(_cfg.watchNumbers||[]).push({numero:p,nome:n||p,notify:true});await cfgSet('watchNumbers',_cfg.watchNumbers);document.getElementById('wPhone').value='';document.getElementById('wName').value='';renderConfig();}
async function cfgRemoveW(num){_cfg.watchNumbers=(_cfg.watchNumbers||[]).filter(w=>w.numero!==num);await cfgSet('watchNumbers',_cfg.watchNumbers);renderConfig();}
function showToast(m,t){const c=document.getElementById('toastContainer');const e=document.createElement('div');e.className='toast '+t;e.textContent=(t==='success'?'\u2713 ':'\u2717 ')+m;c.appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),300);},2500);}
init();
</script>
</body>
</html>
