<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAYA — Analytics</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--o:#f36600;--bg:#0d0b09;--w:#f0ece4;--w2:rgba(240,236,228,0.5);--w3:rgba(240,236,228,0.12);--green:#00cc66;--red:#ff4444;--yellow:#ffaa00}
body{background:var(--bg);color:var(--w);font-family:'Segoe UI',sans-serif;padding:20px;max-width:1200px;margin:0 auto}
h1{color:var(--o);font-size:28px;letter-spacing:4px;margin-bottom:20px}
h2{color:var(--o);font-size:16px;letter-spacing:2px;margin:24px 0 12px;text-transform:uppercase}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:rgba(255,255,255,0.03);border:1px solid var(--w3);border-radius:12px;padding:20px}
.card-label{font-size:11px;color:var(--w2);text-transform:uppercase;letter-spacing:1.5px}
.card-value{font-size:32px;font-weight:700;color:var(--o);margin:8px 0}
.card-sub{font-size:12px;color:var(--w2)}
table{width:100%;border-collapse:collapse;margin:12px 0}
th,td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--w3);font-size:13px}
th{color:var(--o);font-size:11px;text-transform:uppercase;letter-spacing:1px}
.bar{height:8px;background:var(--o);border-radius:4px;transition:width .5s}
.bar-bg{width:100%;height:8px;background:var(--w3);border-radius:4px;overflow:hidden}
a{color:var(--o);text-decoration:none}
.back{margin-bottom:16px;display:inline-block;font-size:12px;opacity:.5}
.back:hover{opacity:1}
#loading{color:var(--w2);font-style:italic}
</style>
</head>
<body>
<a href="/" class="back">← voltar</a>
<h1>ANALYTICS</h1>
<div id="loading">Carregando dados...</div>
<div id="content" style="display:none">
  <div class="grid" id="cards"></div>
  <h2>Ações por Tipo</h2>
  <table id="byType"><thead><tr><th>Tipo</th><th>Quantidade</th><th></th></tr></thead><tbody></tbody></table>
  <h2>Ações por Dia</h2>
  <table id="byDay"><thead><tr><th>Dia</th><th>Tipo</th><th>Total</th></tr></thead><tbody></tbody></table>
  <h2>Últimas Ações</h2>
  <table id="recent"><thead><tr><th>Quando</th><th>Tipo</th><th>Resumo</th></tr></thead><tbody></tbody></table>
</div>
<script>
async function load() {
  try {
    const r = await fetch('/api/analytics');
    const d = await r.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    // Cards
    const cards = document.getElementById('cards');
    const c = d.summary || {};
    cards.innerHTML = [
      { label: 'Total Ações', value: c.total || 0, sub: 'desde o início' },
      { label: 'Hoje', value: c.today || 0, sub: new Date().toLocaleDateString('pt-BR') },
      { label: 'Vídeos', value: c.videos || 0, sub: 'gerados' },
      { label: 'Imagens', value: c.images || 0, sub: 'geradas' },
      { label: 'Pesquisas', value: c.researches || 0, sub: 'realizadas' },
      { label: 'Msgs WhatsApp', value: c.whatsapp || 0, sub: 'enviadas' },
    ].map(i => `<div class="card"><div class="card-label">${i.label}</div><div class="card-value">${i.value}</div><div class="card-sub">${i.sub}</div></div>`).join('');

    // By type
    const maxType = Math.max(...(d.byType || []).map(t => t.total), 1);
    document.querySelector('#byType tbody').innerHTML = (d.byType || []).map(t =>
      `<tr><td>${t.type}</td><td>${t.total}</td><td><div class="bar-bg"><div class="bar" style="width:${(t.total/maxType*100).toFixed(0)}%"></div></div></td></tr>`
    ).join('');

    // By day
    document.querySelector('#byDay tbody').innerHTML = (d.byDay || []).slice(0, 30).map(t =>
      `<tr><td>${t.dia}</td><td>${t.type}</td><td>${t.total}</td></tr>`
    ).join('');

    // Recent
    document.querySelector('#recent tbody').innerHTML = (d.recent || []).map(a =>
      `<tr><td style="white-space:nowrap">${a.createdAt?.slice(0, 16) || ''}</td><td>${a.type}${a.subtype ? '/'+a.subtype : ''}</td><td>${(a.summary || '').slice(0, 80)}</td></tr>`
    ).join('');
  } catch (e) {
    document.getElementById('loading').textContent = 'Erro: ' + e.message;
  }
}
load();
</script>
</body>
</html>
